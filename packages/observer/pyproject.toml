[project]
name = "observer"
version = "0.0.1"
description = "Softmesh observer that republishes captured packets to Cornmeister and mc-radar."
requires-python = ">=3.12"
dependencies = [
    "softmesh-stack",
    "aiomqtt>=2.3",
]

[project.scripts]
observer = "observer.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/observer"]