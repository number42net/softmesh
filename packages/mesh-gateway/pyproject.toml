[project]
name = "mesh-gateway"
version = "0.0.1"
description = "Bridges raw LoRa frames between the Heltec KISS modem (USB serial) and MQTT"
requires-python = ">=3.12"
dependencies = [
    "softmesh-stack",
    "pyserial-asyncio>=0.6",
    "aiomqtt>=2.3",
]

[project.scripts]
mesh-gateway = "mesh_gateway.__main__:main"
mesh-sniff = "mesh_gateway.sniff:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mesh_gateway"]
