[project]
name = "room-server"
version = "0.0.1"
description = "Softmesh room server: password-gated, store-and-forward bulletin board."
requires-python = ">=3.12"
dependencies = [
    "softmesh-stack",
    "aiomqtt>=2.3",
    "aiosqlite>=0.20",
]

[project.scripts]
room-server = "room_server.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/room_server"]
