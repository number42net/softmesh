[project]
name = "softmesh-stack"
version = "0.0.1"
description = "Shared MeshCore protocol library: KISS framing, packet codec, crypto, identity"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=48.0.0",
    "pynacl>=1.6.2",
    "aiomqtt>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/softmesh_stack"]
